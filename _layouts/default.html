<!DOCTYPE html>
<html lang="en-us">
  <head>
    <script>
      // No-FOUC theme: honor stored choice, else system preference.
      (function () {
        try {
          var t = localStorage.getItem("theme");
          if (!t) {
            t = window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          }
          document.documentElement.dataset.theme = t;
        } catch (e) {}
      })();
    </script>
    <title>
      {% if page.title %}{{ page.title }} – {% endif %}{{ site.name }}
    </title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <link
      rel="stylesheet"
      href="{{ '/assets/css/styles.css' | relative_url }}"
    />
    <link rel="icon" href="{{ '/assets/images/favicon.ico' | relative_url }}" />
    <meta
      name="theme-color"
      content="#FCFBF7"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#13130F"
      media="(prefers-color-scheme: dark)"
    />
    {% seo %} {% feed_meta %} {%- if jekyll.environment == 'production' and
    site.google_analytics -%} {%- include google-analytics.html -%} {%- endif
    -%}
  </head>
  <body>
    <div class="wrap">
      {% include navigation.html %}
      <div class="rule"></div>
      {{ content }}
      {% include footer.html %}
    </div>
    <script>
      (function () {
        var root = document.documentElement;
        var btn = document.querySelector(".theme-toggle");
        function syncIcon() {
          if (!btn) return;
          var dark = root.dataset.theme === "dark";
          btn.querySelector(".i-sun").style.display = dark ? "none" : "";
          btn.querySelector(".i-moon").style.display = dark ? "" : "none";
          btn.setAttribute(
            "aria-label",
            dark ? "Switch to light theme" : "Switch to dark theme"
          );
        }
        if (btn) {
          syncIcon();
          btn.addEventListener("click", function () {
            var next = root.dataset.theme === "dark" ? "light" : "dark";
            root.dataset.theme = next;
            try {
              localStorage.setItem("theme", next);
            } catch (e) {}
            syncIcon();
          });
        }
      })();
    </script>
  </body>
</html>
