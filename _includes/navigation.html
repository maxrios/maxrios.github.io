<div class="topbar">
  <a class="brand" href="{{ '/' | relative_url }}">
    <span class="blink"></span>maxrios.dev
  </a>
  <div class="topnav">
    {% for item in site.data.navigation %}
      {% if item.name != "Moody Privacy" %}
        <a href="{{ item.link | relative_url }}"{% if page.url == item.link %} class="on"{% endif %}>{{ item.name | downcase }}</a>
      {% endif %}
    {% endfor %}
    <button type="button" class="theme-toggle" aria-label="Toggle theme">
      <svg class="i-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="4"></circle>
        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
      </svg>
      <svg class="i-moon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" style="display:none">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    </button>
  </div>
</div>
